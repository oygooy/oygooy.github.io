<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>oygooy 블로그</title>
    <meta name="google-site-verification" content="oGU4Bi-Yf8vxgW5q0qZla-DiJBhM9P45gUug_-b7a40" />
    <style>
        body {
            font-family: 'Malgun Gothic', sans-serif;
            margin: 40px auto;
            max-width: 1200px;
            padding: 0 20px;
            background-color: #f9f9f9;
            color: #333;
        }
        
        /* [수정] 제목과 프로필 영역을 한 줄로 정렬하기 위한 헤더 컨테이너 */
        .header-container {
            display: flex;
            align-items: center; /* 세로 기준 정가운데 정렬 */
            gap: 15px;           /* 사진과 글자 사이의 간격 */
            border-bottom: 2px solid #333;
            padding-bottom: 15px;
            margin-bottom: 5px;
        }

        /* [추가] 프로필 이미지 감싸는 링크 링크 스타일 */
        .profile-link {
            display: inline-block;
            text-decoration: none;
            line-height: 0; /* 불필요한 하단 공백 제거 */
        }

        /* [추가] 동그란 프로필 이미지 세부 스타일 */
        .profile-img {
            width: 50px;           /* 프로필 사진 크기 */
            height: 50px;
            border-radius: 50%;    /* 사진을 예쁘게 원형으로 깎음 */
            border: 2px solid #ddd;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            transition: transform 0.2s ease-in-out, border-color 0.2s;
            display: block;
        }

        /* [추가] 프로필 사진에 마우스를 올렸을 때 효과 */
        .profile-link:hover .profile-img {
            transform: scale(1.1); /* 살짝 커지는 효과 */
            border-color: #0066cc; /* 테두리가 테마 색상으로 변경 */
        }

        /* [수정] 헤더 컨테이너 내부로 들어가면서 밑줄(border-bottom) 제거 및 마진 조정 */
        h1 {
            margin: 0;
            padding: 0;
            font-size: 2rem;
            line-height: 1.2;
        }
        
        .welcome-text {
            font-size: 1.1rem;
            margin-top: 15px;
            margin-bottom: 30px;
            color: #666;
        }
        
        /* 3열 2행 바둑판 레이아웃 설정 */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* 가로 3열 */
            gap: 25px; /* 칸 사이의 간격 */
            margin-top: 20px;
        }
        /* 각 프로그램 카드 스타일 (공백 밀착을 위해 flex-start로 설정) */
        .grid-item {
            background: white;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            justify-content: flex-start; /* ◀ 위로 딱 붙도록 설정 */
        }
        /* 공백 조절을 위해 제목 마진 축소 */
        .grid-item h3 {
            margin-top: 0;
            margin-bottom: 8px; /* ◀ 아래쪽 여백 확 줄임 */
            font-size: 1.05rem;
            line-height: 1.4;
        }
        .grid-item h3 a {
            color: #0066cc;
            text-decoration: none;
        }
        .grid-item h3 a:hover {
            text-decoration: underline;
        }
        /* 이미지 크기 자동 맞춤 및 마진 조절 */
        .grid-item img {
            width: 100%;
            height: auto;
            border-radius: 4px;
            border: 1px solid #eee;
            margin-top: 5px; /* ◀ 이미지 위쪽 여백 바짝 밀착 */
        }
        /* 아직 채워지지 않은 빈 카드의 스타일 */
        .grid-item.empty {
            background: #f1f1f1;
            border: 1px dashed #ccc;
            justify-content: center;
            align-items: center;
            min-height: 250px;
            color: #aaa;
            text-align: center;
        }
    </style>
</head>
<body>

    <!-- [수정] 타이틀 영역: 이미지와 글씨가 예쁘게 나란히 배치됩니다 -->
    <div class="header-container">
        <!-- 1. 클릭 시 oygooy님의 깃허브 메인(레포지토리 목록)으로 이동하는 프로필 사진 -->
        <a href="https://github.com/oygooy" target="_blank" rel="noopener noreferrer" class="profile-link" title="oygooy GitHub 바로가기">
            <img src="https://github.com/oygooy.png" alt="oygooy 프로필" class="profile-img">
        </a>
        <!-- 2. 블로그 타이틀 텍스트 -->
        <h1>oygooy의 GitHub Pages</h1>
    </div>
    
    <p class="welcome-text">환영합니다!</p>

    <!-- 3열 2행 그리드 영역 시작 -->
    <div class="grid-container">
        
        <!-- 1행 1열: PPT 폰트 오류 해결 섹션 -->
        <div class="grid-item">
            <h3>1. <a href="https://oygooy.github.io/ppt_fonterror">PPT폰트 오류해결.exe 다운로드 바로가기</a></h3>
            <img src="https://oygooy.github.io/ppt_fonterror/img_ppt글꼴오류해결.png" alt="ppt폰트조회변경">
        </div>

        <!-- 1행 2열: 사진 파일 자체 메모 섹션 -->
        <div class="grid-item">
            <h3>2. <a href="https://oygooy.github.io/picsay">사진 파일 자체 메모(이미지 속성 &gt; 설명 편집기).exe 다운로드 바로가기</a></h3>
            <img src="https://oygooy.github.io/picsay/img_사진속성편집기.png" alt="이미지 속성 메모기">
        </div>

        <!-- 1행 3열: 랜덤문자열 자동입력기 (Autofill) 섹션 -->
        <div class="grid-item">
            <h3>3. <a href="https://github.com/oygooy/Autofill/releases">랜덤문자열 자동입력기.exe 다운로드 바로가기</a></h3>
            <img src="https://raw.githubusercontent.com/oygooy/Autofill/main/screenshot.png" alt="랜덤문자열 자동입력기">
        </div>

        <!-- 2행 1열: 빈칸 -->
        <div class="grid-item empty">
            <p>준비 중인 프로그램입니다 🛠️</p>
        </div>

        <!-- 2행 2열: 빈칸 -->
        <div class="grid-item empty">
            <p>준비 중인 프로그램입니다 🛠️</p>
        </div>

        <!-- 2행 3열: 빈칸 -->
        <div class="grid-item empty">
            <p>준비 중인 프로그램입니다 🛠️</p>
        </div>

    </div>

</body>
</html>
