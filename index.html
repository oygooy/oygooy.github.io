<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>oygooy 블로그</title>
    <meta name="google-site-verification" content="oGU4Bi-Yf8vxgW5q0qZla-DiJBhM9P45gUug_-b7a40" />
    <style>
        body {
            font-family: 'Malgun Gothic', sans-serif;
            margin: 40px auto;
            max-width: 1200px;
            padding: 0 20px;
            background-color: #f9f9f9;
            color: #333;
        }
        h1 {
            border-bottom: 2px solid #333;
            padding-bottom: 10px;
        }
        .welcome-text {
            font-size: 1.1rem;
            margin-bottom: 30px;
            color: #666;
        }
        /* 3열 2행 바둑판 레이아웃 설정 */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* 가로 3열 */
            gap: 25px; /* 칸 사이의 간격 */
            margin-top: 20px;
        }
        /* 각 프로그램 카드 스타일 (공백 밀착을 위해 flex-start로 설정) */
        .grid-item {
            background: white;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            justify-content: flex-start; /* ◀ 위로 딱 붙도록 설정 */
        }
        /* 공백 조절을 위해 제목 마진 축소 */
        .grid-item h3 {
            margin-top: 0;
            margin-bottom: 8px; /* ◀ 아래쪽 여백 확 줄임 */
            font-size: 1.05rem;
            line-height: 1.4;
        }
        .grid-item h3 a {
            color: #0066cc;
            text-decoration: none;
        }
        .grid-item h3 a:hover {
            text-decoration: underline;
        }
        /* 이미지 크기 자동 맞춤 및 마진 조절 */
        .grid-item img {
            width: 100%;
            height: auto;
            border-radius: 4px;
            border: 1px solid #eee;
            margin-top: 5px; /* ◀ 이미지 위쪽 여백 바짝 밀착 */
        }
        /* 아직 채워지지 않은 빈 카드의 스타일 */
        .grid-item.empty {
            background: #f1f1f1;
            border: 1px dashed #ccc;
            justify-content: center;
            align-items: center;
            min-height: 250px;
            color: #aaa;
            text-align: center;
        }
    </style>
</head>
<body>

    <h1>oygooy의 GitHub Pages</h1>
    <p class="welcome-text">환영합니다!</p>

    <!-- 3열 2행 그리드 영역 시작 -->
    <div class="grid-container">
        
        <!-- 1행 1열: PPT 폰트 오류 해결 섹션 -->
        <div class="grid-item">
            <h3>1. <a href="https://oygooy.github.io/ppt_fonterror">PPT폰트 오류해결.exe 다운로드 바로가기</a></h3>
            <img src="https://oygooy.github.io/ppt_fonterror/img_ppt글꼴오류해결.png" alt="ppt폰트조회변경">
        </div>

        <!-- 1행 2열: 사진 파일 자체 메모 섹션 -->
        <div class="grid-item">
            <h3>2. <a href="https://oygooy.github.io/picsay">사진 파일 자체 메모(이미지 속성 &gt; 설명 편집기).exe 다운로드 바로가기</a></h3>
            <img src="https://oygooy.github.io/picsay/img_사진속성편집기.png" alt="이미지 속성 메모기">
        </div>

        <!-- 1행 3열: 랜덤문자열 자동입력기 (Autofill) 섹션 -->
        <div class="grid-item">
            <h3>3. <a href="https://github.com/oygooy/Autofill/releases">랜덤문자열 자동입력기.exe 다운로드 바로가기</a></h3>
            <!-- 제공해주신 screenshot.png 원본 주소를 연동했습니다 -->
            <img src="https://raw.githubusercontent.com/oygooy/Autofill/main/screenshot.png" alt="랜덤문자열 자동입력기">
        </div>

        <!-- 2행 1열: 빈칸 -->
        <div class="grid-item empty">
            <p>준비 중인 프로그램입니다 🛠️</p>
        </div>

        <!-- 2행 2열: 빈칸 -->
        <div class="grid-item empty">
            <p>준비 중인 프로그램입니다 🛠️</p>
        </div>

        <!-- 2행 3열: 빈칸 -->
        <div class="grid-item empty">
            <p>준비 중인 프로그램입니다 🛠️</p>
        </div>

    </div>

</body>
</html>
